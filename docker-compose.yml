# Docker Compose for local development of the single-folder repo
# Run with: docker-compose up

version: '3.8'

services:
  mongodb:
    image: mongo:latest
    container_name: tourguide-mongodb
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password
      MONGO_INITDB_DATABASE: tourguide-marketplace
    ports:
      - "27017:27017"
    volumes:
      - mongodb-data:/data/db
    networks:
      - tourguide-network

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: tourguide-backend
    environment:
      NODE_ENV: development
      PORT: 5000
      MONGODB_URI: mongodb://admin:password@mongodb:27017/tourguide-marketplace?authSource=admin
      JWT_SECRET: dev_secret_key_change_in_production
      FRONTEND_URL: http://localhost:3000
    ports:
      - "5000:5000"
    depends_on:
      - mongodb
    networks:
      - tourguide-network
    command: npm run server:dev

  frontend:
    image: node:18-alpine
    container_name: tourguide-frontend
    working_dir: /app
    environment:
      VITE_API_URL: http://localhost:5000/api
    volumes:
      - .:/app
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - tourguide-network
    command: sh -c "npm install && npm run client -- --host"

volumes:
  mongodb-data:

networks:
  tourguide-network:
    driver: bridge
